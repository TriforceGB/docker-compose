name: romm
services:
  romm:
    container_name: romm
    image: rommapp/romm:latest
    restart: unless-stopped
    depends_on:
      romm-db:
        condition: service_healthy
        restart: true
    # ports:
    #   - 80:8080
    volumes:
      - romm_resources:/romm/resources # Resources fetched from IGDB (covers, screenshots, etc.)
      - romm_redis_data:/redis-data # Cached data for background tasks
      - ${ROMFOLDER}:/romm/library # Your game library. Check https://docs.romm.app/latest/Getting-Started/Folder-Structure/ for more details.
      - ${DOCKERFOLDER}/romm/assets:/romm/assets # Uploaded saves, states, etc.
      - ${DOCKERFOLDER}/romm/config:/romm/config # (Optional) Path where config.yml is stored
    environment:
      DB_HOST: romm-db
      DB_NAME: romm # Should match MARIADB_DATABASE in mariadb
      DB_USER: romm-user # Should match MARIADB_USER in mariadb
      DB_PASSWD: ${DB_PASSWD} # Should match MARIADB_PASSWORD in mariadb
      ROMM_AUTH_SECRET_KEY: ${ROMM_AUTH} # Generate a key with `openssl rand -hex 32`
      RETROACHIEVEMENTS_API_KEY: ${RETRO_API} # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#retroachievements
      STEAMGRIDDB_API_KEY: ${STEAMGRID_API}  # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#steamgriddb
      HASHEOUS_API_ENABLED: true # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#hasheous
      HLTB_API_ENABLED: true
      IGDB_CLIENT_ID: ${IGDB_ID}
      IGDB_CLIENT_SECRET: ${IGDB_SECRET}
      OIDC_ENABLED: true
      OIDC_REDIRECT_URI: https://romm.${URL}/api/oauth/openid
      OIDC_SERVER_APPLICATION_URL: https://authentik.${URL}/application/o/romm
      OIDC_PROVIDER: authentik
      OIDC_CLIENT_ID: ${OIDC_ID}
      OIDC_CLIENT_SECRET: ${OIDC_SECRET}
    labels:
      traefik.enable: true
      traefik.http.routers.romm.tls: true
      traefik.http.routers.romm.rule: Host("romm.${URL}")
      traefik.http.services.romm.loadbalancer.server.port: 8080
      glance.name: RomM
      glance.icon: di:romm
      glance.url: https://romm.${URL}
      glance.description: Rom Management
      glance.category: media
      glance.id: romm
    networks:
      - frontbridge

  romm-db:
    container_name: romm-db
    image: mariadb:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD=${ROOT_DB_PASSWD} # Use a unique, secure password
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
      - MARIADB_PASSWORD=${DB_PASSWD}
    labels:
      glance.name: mysql
      glance.category: media
      glance.parent: romm
    networks:
      - backbridge

volumes:
  mysql_data:
  romm_resources:
  romm_redis_data:



networks:
  frontbridge:
    external: true
  backbridge:
    external: true